# GitHub Pages Configuration

# Set build directory to match the output of your Astro build
baseDirectory: dist

# Use the GitHub Actions automated deployment
# This will be used by github-pages environment in your workflow
branch: gh-pages

# Enable single-page app routing for client-side routing
# Important for Astro applications with dynamic routes
singlePageApp: true

# Configure 404 handling for SPA routing
errorPages:
  404: /404.html